server.port=8080

spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console available at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Base64-encoded 256-bit HMAC-SHA256 key.
# IMPORTANT: Replace this with a securely generated value in production.
# Generate: echo -n "your-secret-here-at-least-32-chars" | base64
security.jwt.secret=Y2hhbmdlLXRoaXMtc2VjcmV0LWtleS1pbi1wcm9kdWN0aW9uLXBsZWFzZSE=
security.jwt.expiry-ms=86400000
security.jwt.token-prefix=Bearer
security.jwt.header-name=Authorization

logging.level.com.example=DEBUG
logging.level.org.springframework.security=INFO
